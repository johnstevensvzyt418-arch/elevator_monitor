<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>电梯状态监控页面</title>
    <link rel="stylesheet" type="text/css" href="static/css/main.css">
</head>

<body>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <div class="card">
        <div class="card-title b-light b-b">
            <div class="font-thin h5">
                电梯ID：<span id="device">获取中</span>
            </div>
            <div class="font-thin h5">
                最后更新时间：<span id="lastUpdateTime">正在获取数据中</span>
            </div>
            <div class="font-thin h5" style="margin-left:auto;">
                <span class="status-dot disconnected" id="statusDot"></span>
                设备状态：<span id="connectionStatus">等待数据</span>
            </div>
        </div>
        <div class="card-main">
            <div class="card-main-harf b-light b-r">
                <div class="card-floor-show">
                    <div class="card-floor-show-floortext">
                        <span id="direction">-</span> <span id="floor">00</span>
                    </div>
                    <div class="card-floor-show-tofloortext">
                        目标层：<span id="toFloor">00</span>
                    </div>
                </div>
                <div class="card-floor-info b-light b-t">
                    <div class="card-floor-info-card b-light b-r">
                        <span class="card-floor-info-card-title">状态</span>
                        <div class="font-thin h2"><span id="status-text">获取中</span></div>
                    </div>
                    <div class="card-floor-info-card">
                        <span class="card-floor-info-card-title">厢门</span>
                        <div class="font-thin h2"><span id="door">获取中</span></div>
                    </div>
                </div>
                <div class="card-floor-info b-light b-t b-b">
                    <div class="card-floor-info-card b-light b-r">
                        <span class="card-floor-info-card-title">乘客</span>
                        <div class="font-thin h2"><span id="passenger">获取中</span></div>
                    </div>
                    <div class="card-floor-info-card">
                        <span class="card-floor-info-card-title">速度</span>
                        <div class="font-thin h2"><span id="speed">获取中</span></div>
                    </div>
                </div>
            </div>
            <div class="card-main-harf">
                <ul class="list-group list-group-lg m-b-none">
                    <li class="list-group-item font-thin" id="alarm_00">
                        <span class="list-group-item-status" id="alarm_00_text">○</span>
                        <span class="list-group-item-text">困人</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_01">
                        <span class="list-group-item-status" id="alarm_01_text">○</span>
                        <span class="list-group-item-text">超速运行</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_02">
                        <span class="list-group-item-status" id="alarm_02_text">○</span>
                        <span class="list-group-item-text">低速运行</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_03">
                        <span class="list-group-item-status" id="alarm_03_text">○</span>
                        <span class="list-group-item-text">冲顶</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_04">
                        <span class="list-group-item-status" id="alarm_04_text">○</span>
                        <span class="list-group-item-text">蹲底</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_05">
                        <span class="list-group-item-status" id="alarm_05_text">○</span>
                        <span class="list-group-item-text">开门运行</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_06">
                        <span class="list-group-item-status" id="alarm_06_text">○</span>
                        <span class="list-group-item-text">开门载人运行</span>
                    </li>
                    <li class="list-group-item font-thin" id="alarm_07">
                        <span class="list-group-item-status" id="alarm_07_text">○</span>
                        <span class="list-group-item-text">检修状态</span>
                    </li>
                </ul>
            </div>
        </div>
        <div class="ai-panel" id="aiPanel"></div>
    </div>

    <script src="/static/js/ai-monitor.js"></script>
    <script>
    (function() {
        'use strict';

        // ========== DOM 引用 ==========
        var device = document.getElementById("device");
        var lastUpdateTime = document.getElementById("lastUpdateTime");
        var floor = document.getElementById("floor");
        var toFloor = document.getElementById("toFloor");
        var direction = document.getElementById("direction");
        var door = document.getElementById("door");
        var statusText = document.getElementById("status-text");
        var passenger = document.getElementById("passenger");
        var speed = document.getElementById("speed");
        var connectionStatus = document.getElementById("connectionStatus");
        var statusDot = document.getElementById("statusDot");
        var toast = document.getElementById("toast");
        var aiMonitor = window.AiMonitor.init({
            rootId: 'aiPanel',
            onAbnormal: function(result) {
                showToast('AI 检测到 ' + result.deviceId + ' 异常，请及时核查', 'warning');
            }
        });

        // ========== 报警列表项缓存 ==========
        var alarmItems = {};
        var alarmTexts = {};
        for (var i = 0; i < 8; i++) {
            var code = (i < 10 ? '0' : '') + i;
            alarmItems[code] = document.getElementById('alarm_' + code);
            alarmTexts[code] = document.getElementById('alarm_' + code + '_text');
        }

        // ========== 告警码映射 ==========
        var ALARM_MAP = {
            "00": 0, "01": 1, "02": 2, "03": 3,
            "04": 4, "05": 5, "06": 6, "07": 7
        };

        // ========== WebSocket 连接管理 ==========
        var ws = null;
        var reconnectTimer = null;
        var reconnectDelay = 1000;
        var maxReconnectDelay = 30000;

        // ========== 设备数据超时检测 ==========
        var lastDataTime = 0;           // 最后一次收到设备数据的时间戳
        var staleCheckTimer = null;     // 超时检测定时器
        var STALE_THRESHOLD = 30000;    // 30 秒无数据视为设备离线
        var wsConnected = false;        // WebSocket 是否连通

        function connectWebSocket() {
            if (ws) {
                try { ws.close(); } catch(e) {}
            }

            var url = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
            ws = new WebSocket(url);

            ws.onopen = function() {
                clearReconnectTimer();
                reconnectDelay = 1000;
                wsConnected = true;
                if (lastDataTime === 0) {
                    setDeviceStatus('waiting');
                }
                lastUpdateTime.textContent = dateFtt('yyyy-MM-dd hh:mm:ss', new Date());
                showToast('已连接到监控服务器', 'success');
            };

            ws.onmessage = function(msg) {
                try {
                    var obj = JSON.parse(msg.data);
                    if (obj.type === 'ai_result') {
                        if (obj.data && obj.data.RuleName) {
                            handleRuleAlarm(obj.data);
                        }
                        aiMonitor.handle(obj.data);
                        return;
                    }
                    handleMessage(obj);
                } catch(e) {}
            };

            ws.onclose = function() {
                wsConnected = false;
                setDeviceStatus('disconnected');
                scheduleReconnect();
            };

            ws.onerror = function() {};
        }

        function scheduleReconnect() {
            clearReconnectTimer();
            showToast('连接已断开，正在重连... (' + Math.round(reconnectDelay / 1000) + 's)', 'warning');
            reconnectTimer = setTimeout(function() {
                connectWebSocket();
                reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            }, reconnectDelay);
        }

        function clearReconnectTimer() {
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        }

        /**
         * 设置设备状态显示。
         * @param {'online'|'offline'|'waiting'|'disconnected'} state
         */
        function setDeviceStatus(state) {
            switch (state) {
                case 'online':
                    connectionStatus.textContent = '设备在线';
                    statusDot.className = 'status-dot connected';
                    break;
                case 'offline':
                    connectionStatus.textContent = '设备离线';
                    statusDot.className = 'status-dot disconnected';
                    break;
                case 'waiting':
                    connectionStatus.textContent = '等待数据';
                    statusDot.className = 'status-dot disconnected';
                    break;
                case 'disconnected':
                    connectionStatus.textContent = '服务断开';
                    statusDot.className = 'status-dot disconnected';
                    break;
            }
        }

        /**
         * 启动设备数据超时检测，每 5 秒检查一次。
         */
        function startStaleCheck() {
            if (staleCheckTimer) clearInterval(staleCheckTimer);
            staleCheckTimer = setInterval(function() {
                var now = Date.now();
                if (lastDataTime > 0 && wsConnected && (now - lastDataTime) > STALE_THRESHOLD) {
                    setDeviceStatus('offline');
                    if (statusText) statusText.textContent = '离线';
                }
            }, 5000);
        }

        /**
         * 处理规则引擎告警（DEVICE_OFFLINE 等）。
         */
        function handleRuleAlarm(data) {
            var deviceId = data.DeviceId || '';
            var ruleName = data.RuleName || '';
            var desc = data.Description || '';
            if (ruleName === 'DEVICE_OFFLINE') {
                setDeviceStatus('offline');
                if (statusText) statusText.textContent = '离线';
                showToast('⚠ ' + (deviceId || '设备') + ' 离线: ' + desc, 'warning');
            }
        }

        // ========== 消息处理 ==========
        function handleMessage(obj) {
            // 设备 ID（使用 textContent 防 XSS）
            device.textContent = obj.Device || '--';
            aiMonitor.showDevice(obj.Device);

            // 楼层
            floor.textContent = obj.Floor || '--';
            toFloor.textContent = obj.ToFloor || '--';

            // 速度
            speed.textContent = obj.Speed || '--';

            // 状态
            switch(obj.Status) {
                case '00': statusText.textContent = '正常'; break;
                case '01': statusText.textContent = '异常'; break;
                case '02': statusText.textContent = '未知'; break;
                default:   statusText.textContent = '--';   break;
            }

            // 方向
            switch(obj.Direction) {
                case '00': direction.textContent = ' '; break;
                case '01': direction.textContent = '▲'; break;
                case '02': direction.textContent = '▼'; break;
                default:   direction.textContent = '-'; break;
            }

            // 轿厢门
            switch(obj.Door) {
                case '00': door.textContent = '关门到位'; break;
                case '01': door.textContent = '开门到位'; break;
                case '02': door.textContent = '关门中';   break;
                case '03': door.textContent = '开门中';   break;
                default:   door.textContent = '--';       break;
            }

            // 乘客
            switch(obj.Passenger) {
                case '00': passenger.textContent = '无乘客'; break;
                case '01': passenger.textContent = '有乘客'; break;
                default:   passenger.textContent = '--';     break;
            }

            // ========== 报警信息（数字码 + 字符串回退） ==========
            resetAllAlarms();
            var alarmStr = obj.Alarm || '';
            if (alarmStr) {
                var matched = false;
                // 先尝试数字编码匹配
                for (var code in ALARM_MAP) {
                    if (alarmStr.indexOf(code) > -1) {
                        setAlarmOn(ALARM_MAP[code]);
                        matched = true;
                    }
                }
                // 字符串回退匹配（兼容后端告警规则引擎命名的告警码）
                if (!matched) {
                    if (alarmStr.indexOf('LEVELING') > -1 || alarmStr.indexOf('TIMEOUT') > -1) setAlarmOn(0);
                    if (alarmStr.indexOf('ALARM_FIELD') > -1) setAlarmOn(0);
                    if (alarmStr.indexOf('LOW_SPEED') > -1) setAlarmOn(2);
                    else if (alarmStr.indexOf('SPEED') > -1) setAlarmOn(1);
                    if (alarmStr.indexOf('OVER_TOP') > -1) setAlarmOn(3);
                    if (alarmStr.indexOf('FLOOR_JUMP') > -1) setAlarmOn(4);
                    if (alarmStr.indexOf('DOOR_OPEN_RUNNING') > -1) {
                        setAlarmOn(5);
                        // 开门载人运行：DOOR_OPEN_RUNNING + 有乘客
                        if (obj.Passenger === '01') setAlarmOn(6);
                    }
                    if (alarmStr.indexOf('DOOR_OPEN_TOO_LONG') > -1) setAlarmOn(5);
                    if (alarmStr.indexOf('LONG_IDLE') > -1 || alarmStr.indexOf('IDLE') > -1) setAlarmOn(7);
                    if (alarmStr.indexOf('DEVICE_OFFLINE') > -1 || alarmStr.indexOf('OFFLINE') > -1) setAlarmOn(7);
                    if (alarmStr.indexOf('DIRECTION') > -1) setAlarmOn(7);
                }
            }

            // 更新时间 & 刷新设备在线状态
            lastUpdateTime.textContent = dateFtt('yyyy-MM-dd hh:mm:ss', new Date());
            lastDataTime = Date.now();
            // 如果告警中已包含 DEVICE_OFFLINE，不要覆盖为在线
            if (alarmStr.indexOf('DEVICE_OFFLINE') > -1) {
                setDeviceStatus('offline');
                if (statusText) statusText.textContent = '离线';
            } else {
                setDeviceStatus('online');
                if (statusText && statusText.textContent === '离线') {
                    statusText.textContent = '正常';
                }
            }
        }

        function resetAllAlarms() {
            for (var i = 0; i < 8; i++) {
                var code = (i < 10 ? '0' : '') + i;
                var item = alarmItems[code];
                var icon = alarmTexts[code];
                if (item) item.className = 'list-group-item font-thin';
                if (icon) icon.textContent = '\u25CB';
            }
            if (speed) speed.className = 'font-thin h2';
        }

        function setAlarmOn(index) {
            var code = (index < 10 ? '0' : '') + index;
            var item = alarmItems[code];
            var icon = alarmTexts[code];
            if (item) item.className = 'list-group-item font-thin list-group-item-alarm';
            if (icon) icon.textContent = '\u2609';
            if (index === 1 && speed) speed.className = 'font-thin h2 list-group-item-alarm';
        }

        // ========== Toast 提示 ==========
        function showToast(message, type) {
            toast.textContent = message;
            toast.className = 'toast ' + (type || '') + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(function() {
                toast.className = 'toast';
            }, 3000);
        }

        // ========== 日期格式化 ==========
        function dateFtt(fmt, date) {
            var o = {
                'M+': date.getMonth() + 1,
                'd+': date.getDate(),
                'h+': date.getHours(),
                'm+': date.getMinutes(),
                's+': date.getSeconds(),
                'q+': Math.floor((date.getMonth() + 3) / 3),
                'S' : date.getMilliseconds()
            };
            if (/(y+)/.test(fmt))
                fmt = fmt.replace(RegExp.$1, (date.getFullYear() + '').substr(4 - RegExp.$1.length));
            for (var k in o)
                if (new RegExp('(' + k + ')').test(fmt))
                    fmt = fmt.replace(RegExp.$1, (RegExp.$1.length === 1) ? (o[k]) : (('00' + o[k]).substr(('' + o[k]).length)));
            return fmt;
        }

        // ========== 清理 ==========
        window.addEventListener('beforeunload', function() {
            clearReconnectTimer();
            if (ws) {
                ws.onclose = null;
                ws.close();
            }
        });

        // ========== 启动 ==========
        lastUpdateTime.textContent = '正在连接...';
        connectWebSocket();
        startStaleCheck();

    })();
    </script>
</body>
</html>
