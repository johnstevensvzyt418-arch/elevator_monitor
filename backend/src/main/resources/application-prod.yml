# ============================================================
# Elevator Monitor — 生产环境配置 (SealOS 云部署)
# 激活方式: --spring.profiles.active=prod
# ============================================================
server:
  port: ${SERVER_PORT:10008}

spring:
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/elevator_monitor?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:SZTUbdi@1005}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    cn.edu.sztu: info

# 生产环境告警阈值
alarm:
  leveling:
    timeout-seconds: 5
  door-open:
    threshold-seconds: 20
  speed:
    max-mps: 3.0
  floor-jump:
    max-diff: 2
  long-idle:
    threshold-seconds: 60
  device-offline:
    threshold-seconds: 120
  cooldown:
    default-seconds: 300

# MQTT — 远程 EMQX Broker
mqtt:
  broker:
    url: ${MQTT_BROKER_URL:tcp://tcp.sealosbja.site:35205}
  client:
    id: ${MQTT_CLIENT_ID:elevator-monitor-prod}
  topic: /Elevator
  command-up-topic: /elevator/+/command/up
  qos: 1
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:SZTUbdi@1005}

# 云平台接入
platform:
  web-url: ${PLATFORM_WEB_URL:https://aqwtmupbegka.sealosbja.site}
  api-base: ${PLATFORM_API_BASE:https://bbjxeudameoz.sealosbja.site/api}
  ws-url: ${PLATFORM_WS_URL:wss://bbjxeudameoz.sealosbja.site/ws}
  auth:
    username: ${PLATFORM_USERNAME:admin}
    password: ${PLATFORM_PASSWORD:SZTUbdi@1005}
