# ============================================================
# Elevator Monitor — 主配置文件
# ============================================================
server:
  port: 10008
  shutdown: graceful
  tomcat:
    uri-encoding: UTF-8

logging:
  level:
    cn.edu.sztu: debug

spring:
  # HTTP 编码强制 UTF-8（消除中文乱码）
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # 生命周期
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Redis
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
        max-wait: 1000ms

  # MySQL
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/elevator_monitor?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

elevator:
  storage:
    type: mysql

alarm:
  long-idle:
    threshold-seconds: 60
  door-open:
    threshold-seconds: 20
  speed:
    max-mps: 3.0
  low-speed:
    min-mps: 0.1
  floor-jump:
    max-diff: 2
  over-top:
    max-floor: 30
  leveling:
    timeout-seconds: 5
  cooldown:
    default-seconds: 300

push:
  endpoint:
    monake: redis://elevator:status
    xinshida: redis://elevator:status
    sightseeing: redis://elevator:status
    mnk: redis://elevator:status

# ============================================================
# MQTT — 嵌入式设备数据接入 (远程 EMQX Broker)
# 按设备接入指南: tcp.sealosbja.site:35205
# ============================================================
mqtt:
  broker:
    url: ${MQTT_BROKER_URL:tcp://tcp.sealosbja.site:35205}
  client:
    id: elevator-monitor-backend-${random.uuid}
  # 设备上报主题 (设备 → 平台)
  topic: /Elevator
  # 命令回执主题 (设备 → 平台)
  command-up-topic: /elevator/+/command/up
  qos: 1
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:SZTUbdi@1005}

# ============================================================
# 云平台接入配置 (SealOS 部署)
# ============================================================
platform:
  # Web 管理后台
  web-url: ${PLATFORM_WEB_URL:https://aqwtmupbegka.sealosbja.site}
  # API 基础地址
  api-base: ${PLATFORM_API_BASE:https://bbjxeudameoz.sealosbja.site/api}
  # WebSocket 地址
  ws-url: ${PLATFORM_WS_URL:wss://bbjxeudameoz.sealosbja.site/ws}
  # 平台认证
  auth:
    username: ${PLATFORM_USERNAME:admin}
    password: ${PLATFORM_PASSWORD:SZTUbdi@1005}